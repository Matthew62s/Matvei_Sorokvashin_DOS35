<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Домашнее задание №15</title>
    <!-- Подключаем стили для красивого оформления -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7fa; /* Светлый фон */
            color: #333; /* Темный текст */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            background-color: white;
        }
        h1 {
            font-size: 2.5em;
            color: #0a6ed1; /* Синий цвет для темы урока */
            word-wrap: break-word; /* Переносит длинную тему на новую строку */
        }
        p {
            font-size: 1.5em;
            color: #2c3e50;
            margin-top: -0.5em; /* Прижимает фамилию к теме */
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Тема урока -->
        <h1>Тема урока:</h1>
        <p id="topic">Домашнее задание №15. установка, настройка и использование веб сервера nginx/</p>

        <!-- Фамилия ученика -->
        <h1 style="margin-top: 2em;">Фамилия:</h1>
        <p id="surname">Сороквашин</p>
    </div>

</body>
</html>
