server {
    server_name lesson15.vbdd.ru;

    root /var/www/lesson/;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/lesson15.vbdd.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/lesson15.vbdd.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = lesson15.vbdd.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name lesson15.vbdd.ru;
    return 404; # managed by Certbot


}
